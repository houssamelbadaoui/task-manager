<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Manager</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <h2 class="logo">TaskBoard</h2>
        <nav class="menu">
          <button class="menu-item active" data-filter="all">All Tasks</button>
          <button class="menu-item" data-filter="today">Today</button>
          <button class="menu-item" data-filter="completed">Completed</button>
          <button class="menu-item" data-filter="pending">Pending</button>
        </nav>
      </aside>

      <main class="main">
        <header class="main-header">
          <div>
            <h1>Dashboard</h1>
            <p class="subtitle">Manage your tasks for the week</p>
          </div>

          <div class="stats">
            <div class="stat-card">
              <div class="stat-label">Total</div>
              <span class="stat-value" id="stat-total">0</span>
            </div>

            <div class="stat-card">
              <div class="stat-label">Completed</div>
              <span class="stat-value" id="stat-completed">0</span>
            </div>

            <div class="stat-card">
              <div class="stat-label">Pending</div>
              <span class="stat-value" id="stat-pending">0</span>
            </div>
          </div>
        </header>

        <section class="task-panel">
          <form id="task-form" class="task-form">
            <div class="field-group">
              <label for="task-title">Title</label>
              <input
                type="text"
                id="task-title"
                placeholder="e.g. Finish Express project"
                required
              />
            </div>

            <div class="field-group">
              <label for="task-desc">Description</label>
              <input
                type="text"
                id="task-desc"
                placeholder="Optional details..."
              />
            </div>

            <div class="field-row">
              <div class="field-group">
                <label for="task-date">Due date</label>
                <input type="date" id="task-date" />
              </div>
              <div class="field-group">
                <label>Status</label>
                <select id="task-status">
                  <option value="pending" selected>Pending</option>
                  <option value="in-progress">In progress</option>
                  <option value="done">Done</option>
                </select>
              </div>

              <button type="submit" class="btn-primary">Add Task</button>
            </div>
          </form>

          <ul id="task-list" class="task-list"></ul>
        </section>
      </main>
    </div>
    <script src="app.js"></script>
  </body>
</html>
